name: "Flutter: Analyze & Test"

on:
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
  pull_request:
    branches: [main]
    paths:
      - "apps/mobile/**"

jobs:
  flutter-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test
