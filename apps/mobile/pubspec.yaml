name: purdue_personal_trainer
description: AI-powered fitness planning for Purdue students.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.5.0
  cloud_functions: ^5.1.0
  google_sign_in: ^6.2.0

  # State management
  flutter_riverpod: ^2.6.0
  riverpod_annotation: ^2.6.0

  # Routing
  go_router: ^14.6.0

  # Networking
  dio: ^5.7.0

  # UI
  intl: ^0.19.0
  uuid: ^4.5.0

  # Models
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.8.0
  freezed: ^2.5.0
  riverpod_generator: ^2.6.0

flutter:
  uses-material-design: true
  assets:
    - assets/

  # fonts:
  #   - family: Boilermaker
  #     fonts:
  #       - asset: assets/fonts/Boilermaker-Regular.ttf
